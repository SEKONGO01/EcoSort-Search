<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultat - EcoSort-Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="predict-page" style="background-color: {{ bin_couleur }};">
    <h1>{{ bin_nom }}</h1>
    <img src="{{ image_url }}" alt="{{ nom_produit }}">
    <p><strong>{{ nom_produit }}</strong></p>
    {% if confidence %}
        <p>Confiance du modèle : {{ (confidence * 100) | round(1) }}%</p>
    {% endif %}
    <br>
    <a href="/">← Nouvelle recherche</a>
</body>
</html>
